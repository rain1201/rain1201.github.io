<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>music</title>
		<script src="./js/back.js" type="text/javascript"></script>
		<link type="text/css" rel="stylesheet" href="css/lyrics.css" />
		<link rel="stylesheet" href="css/solid.css">
		<link rel="stylesheet" href="css/fontawesome.css">
		<link rel="stylesheet" href="css/style.css">
		
		
	</head>
	<body>
		<script>a()</script>
	    <div id="dowebok">
        <div id="bg-artwork"></div>
        <div id="bg-layer"></div>
        <div id="player">
            <div id="player-track">
                <div id="album-name"></div>
                <div id="track-name"></div>
                <div id="track-time">
                    <div id="current-time"></div>
                    <div id="track-length"></div>
                </div>
                <div id="s-area">
                    <div id="ins-time"></div>
                    <div id="s-hover"></div>
                    <div id="seek-bar"></div>
                </div>
            </div>
            <div id="player-content">
                <div id="album-art">
                    <!--<img src="img/1.jpg" class="active" id="_1">
                    <img src="img/2.jpg" id="_2">
                    <img src="img/3.jpg" id="_3">
                    <img src="img/4.jpg" id="_4">
                    <img src="img/5.jpg" id="_5">
                    <div id="buffer-box">加载中...</div>
					-->
                </div>
                <div id="player-controls">
                    <div class="control">
                        <div class="button" id="play-previous">
                            <i class="fas fa-backward"></i>
                        </div>
                    </div>
                    <div class="control">
                        <div class="button" id="play-pause-button">
                            <i class="fas fa-play"></i>
                        </div>
                    </div>
                    <div class="control">
                        <div class="button" id="play-next">
                            <i class="fas fa-forward"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
	<div style="position: absolute;top: 10%;right: 0;left: 30%;width: 430px;height: 50px;margin: -4px auto;">
	<ul id="lrclist" style="position: absolute;top: 40%;right: 0;left: 0;width: 430px;height: 100px;margin: -4px auto;"><!-- 初始值 -->
					
				</ul>
			</div>
	
	<script src="js/back.js" type="text/javascript"></script>
	<script src="js/jquery.min.js"></script>
    <script src="js/index.js"></script>
	<script src="js/lyrics.js"></script>
	</body>
</html>
